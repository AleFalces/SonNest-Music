name: Keep backend awake

# The free Render instance sleeps after ~15 min of inactivity, which causes a
# ~30s cold start on the next request. This pings the health endpoint on a
# schedule to keep the service warm. (GitHub may delay scheduled runs and
# disables them after 60 days of repo inactivity, so an external uptime monitor
# is kept as a more reliable backup.)
on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes
  workflow_dispatch: # allow manual runs

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: >
          curl -fsS --retry 3 --retry-all-errors --max-time 60
          https://e-comerce-l5gu.onrender.com/health
